server:
  url: 'https://adachidb.net'
  port: 3000
  frontend: true
  dev_frontend: false
  openAPI: true
  banner: true

rateLimit:
  windowSeconds: 60
  limits:
    api:
      status: 120
      pending-count: 60
      pending-text-count: 60
      uncreated-count: 60
      posts:
        random: 3000
        random10: 2000
        search: 1000
        all: 30
        export: 10
        exportAll: 2
        add: 200

backup:
  enable: true
  interval: 60
  keep: 3

database:
  countsDB: 'counts.db'


scraping:
  interval: 1000
  summaryPage:
    url: 'https://herrkf.com/adachi-words'
    htmlTag: 'p a'
    includeKeywords: []
    excludeKeywords:
    - 'x.com'
    - 'nicovideo.jp'
    - 'catchup'

  monthlyPage:
    htmlTag: 'a'
    includeKeywords:
    - 'https://x.com/adachirei0/status/'
    - 'https://twitter.com/adachirei0/status/'
    excludeKeywords:
    - 'quotes'
    # - '?ref_src=twsrc%5Etfw' # これを入れると手動でのツイートが弾かれます
